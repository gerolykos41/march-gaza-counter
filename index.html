function buildTimeline() {
  const events = EVENTS
    .map(e => ({ ...e, date: new Date(e.date), dayOffset: Math.floor((new Date(e.date) - START_DATE) / 86400000) }))
    .filter(e => e.dayOffset >= 0)
    .sort((a,b) => a.dayOffset - b.dayOffset);

  const wrap = document.getElementById('events-wrap');
  let placed = [];
  events.forEach((ev, i) => {
    let y = ev.dayOffset * PX_PER_DAY;
    if (i > 0 && y - placed[i-1] < MIN_GAP) y = placed[i-1] + MIN_GAP;
    placed.push(y);
  });

  const totalH = placed[placed.length - 1] + 100;
  wrap.style.position = 'relative';
  wrap.style.height = totalH + 'px';

  // Static spine line
  const spine = document.getElementById('spine-line');
  spine.style.height = totalH + 'px';

  events.forEach((ev, i) => {
    const y = placed[i];
    const side = i % 2 === 0 ? 'ev-right' : 'ev-left';
    const div = document.createElement('div');
    div.className = `ev ${side}`;
    div.style.top = y + 'px';

    const dot = document.createElement('div');
    const dotClass = ev.type === 'critical' ? 'red' : ev.type === 'solidarity' ? 'green' : '';
    dot.className = 'ev-dot' + (dotClass ? ' ' + dotClass : '');
    div.appendChild(dot);

    const inner = document.createElement('div');
    inner.className = 'ev-inner';

    const dateEl = document.createElement('span');
    dateEl.className = 'ev-date';
    dateEl.textContent = ev.date.toLocaleDateString('el-GR', {day:'numeric', month:'short', year:'numeric'});
    inner.appendChild(dateEl);

    const titleEl = document.createElement('a');
    const titleClass = ev.type === 'critical' ? 'red' : ev.type === 'solidarity' ? 'green' : '';
    titleEl.className = 'ev-title' + (titleClass ? ' ' + titleClass : '');
    titleEl.href = ev.link;
    titleEl.target = '_blank';
    titleEl.rel = 'noopener noreferrer';
    titleEl.textContent = ev.title;
    inner.appendChild(titleEl);

    div.appendChild(inner);
    wrap.appendChild(div);
  });
}

buildTimeline();
